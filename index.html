<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meu Guia Axe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-base: #000000;
            --bg-elevated: #1C1C1E;
            --bg-elevated-2: #2C2C2E;
            --accent: #FF3B30;
            --accent-dark: #D70015;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background: var(--bg-base); 
            color: var(--text-primary); 
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tab-content { 
            display: none; 
            height: 100%; 
            overflow-y: auto; 
            padding-bottom: 140px; 
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-bar {
            background: rgba(28, 28, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        input[type="text"], input[type="date"], input[type="time"] {
            font-size: 16px; 
            appearance: none;
        }

        .checked-item { 
            text-decoration: line-through; 
            color: var(--text-secondary);
        }

        .privacy-box {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            padding: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-red-500/30">

    <header class="glass-bar p-4 border-b border-white/10 flex items-center justify-center gap-2 shrink-0 z-50 pt-safe">
        <img src="logo.png" class="h-5 w-5 object-contain rounded-md" onerror="this.style.display='none'">
        <h1 class="text-xs font-bold tracking-widest text-zinc-300 uppercase">Meu Guia Axe</h1>
    </header>

    <main class="flex-1 overflow-hidden relative">
        
        <section id="tab-chat" class="tab-content active p-4 no-scrollbar">
            <div id="chat-messages" class="flex flex-col gap-4"></div>
            <div class="privacy-box">
                Os dados do chat são armazenados localmente e criptografados.
            </div>
        </section>

        <section id="tab-notes" class="tab-content p-4 no-scrollbar">
            <h2 class="text-zinc-500 text-[10px] font-bold tracking-[0.2em] mb-4 uppercase text-center">Fundamentos e Notas</h2>
            <div id="notes-list" class="flex flex-col gap-3"></div>
        </section>

        <section id="tab-dates" class="tab-content p-4 no-scrollbar">
            <div class="bg-[#1C1C1E] p-5 rounded-3xl border border-white/5 mb-6 shadow-sm">
                <p class="text-[10px] font-bold text-[#FF3B30] tracking-wider uppercase mb-5">Novo Lembrete</p>
                <input type="text" id="d-title" placeholder="Título do lembrete" class="w-full bg-[#2C2C2E] rounded-xl p-4 mb-4 outline-none text-white font-medium placeholder-zinc-500 transition-colors focus:ring-2 focus:ring-[#FF3B30]/50">
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <input type="date" id="d-day" class="bg-[#2C2C2E] p-4 rounded-xl text-white outline-none w-full text-center">
                    <input type="time" id="d-time" class="bg-[#2C2C2E] p-4 rounded-xl text-white outline-none w-full text-center">
                </div>
                <button onclick="addReminder()" class="w-full bg-[#FF3B30] hover:bg-[#D70015] transition-colors py-4 rounded-xl font-bold text-[13px] text-white active:scale-95">Adicionar no Celular</button>
            </div>
            <div id="reminders-list" class="flex flex-col gap-3"></div>
        </section>

        <section id="tab-buy" class="tab-content p-4 no-scrollbar">
            <div class="bg-[#1C1C1E] p-4 rounded-3xl border border-white/5 mb-5 shadow-sm">
                <div class="flex justify-between items-center mb-4 px-1">
                    <p class="text-[10px] font-bold text-[#FF3B30] uppercase tracking-wider">Lista de Compras</p>
                    <span id="b-count" class="text-[10px] font-bold text-zinc-400 bg-[#2C2C2E] px-2.5 py-1 rounded-md">0</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="b-input" placeholder="Novo item..." class="flex-1 bg-[#2C2C2E] rounded-xl p-3 px-4 text-white outline-none font-medium placeholder-zinc-500">
                    <button onclick="addBuy()" class="bg-[#FF3B30] text-white p-3 px-4 rounded-xl active:scale-90 transition-transform"><i data-lucide="plus" size="20"></i></button>
                </div>
            </div>
            <div id="buy-list" class="flex flex-col gap-2 mb-6"></div>
            <button onclick="shareBuy()" class="w-full bg-[#34C759] text-white py-4 rounded-xl font-bold text-[13px] flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg shadow-[#34C759]/20">
                <i data-lucide="share" size="18"></i> Compartilhar
            </button>
        </section>
    </main>

    <div id="input-bar" class="fixed bottom-[72px] w-full p-3 glass-bar border-t border-white/5 flex gap-2 items-center z-40 transition-all">
        <div class="flex-1 bg-[#2C2C2E] rounded-full px-4 flex items-center border border-white/5">
            <input type="text" id="c-input" placeholder="Ex: tomar banho segunda às 14:00..." class="w-full bg-transparent outline-none h-11 text-[15px] text-white" onkeyup="checkCorrection(event)">
        </div>
        <button onclick="sendMsg()" class="bg-[#FF3B30] text-white h-11 w-11 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform">
            <i data-lucide="arrow-up" size="20"></i>
        </button>
    </div>

    <nav class="fixed bottom-0 w-full glass-bar border-t border-white/10 flex justify-around p-2 pb-safe z-50">
        <button onclick="switchTab('tab-chat')" class="nav-btn flex flex-col items-center gap-1 p-2 text-[#FF3B30] transition-colors w-16" id="nav-tab-chat">
            <i data-lucide="message-circle" size="22"></i>
            <span class="text-[9px] font-semibold mt-0.5">Chat</span>
        </button>
        <button onclick="switchTab('tab-notes')" class="nav-btn flex flex-col items-center gap-1 p-2 text-[#8E8E93] transition-colors w-16" id="nav-tab-notes">
            <i data-lucide="book" size="22"></i>
            <span class="text-[9px] font-semibold mt-0.5">Notas</span>
        </button>
        <button onclick="switchTab('tab-dates')" class="nav-btn flex flex-col items-center gap-1 p-2 text-[#8E8E93] transition-colors w-16" id="nav-tab-dates">
            <i data-lucide="calendar" size="22"></i>
            <span class="text-[9px] font-semibold mt-0.5">Datas</span>
        </button>
        <button onclick="switchTab('tab-buy')" class="nav-btn flex flex-col items-center gap-1 p-2 text-[#8E8E93] transition-colors w-16" id="nav-tab-buy">
            <i data-lucide="shopping-bag" size="22"></i>
            <span class="text-[9px] font-semibold mt-0.5">Compras</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0dsLtR2gnW6IkghjLyjRnH_hatgqLeoA",
            authDomain: "meu-gui-axe.firebaseapp.com",
            projectId: "meu-gui-axe",
            storageBucket: "meu-gui-axe.firebasestorage.app",
            messagingSenderId: "589824726080",
            appId: "1:589824726080:web:1b7e366e5099da96c43ba5",
            measurementId: "G-8W4FK6XV30"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        async function initFCM() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: 'BO3q1vuQR5Il-IFvmgfOpQin4hS9lZe9dN6RAHFRp-aQYWw3RC9v9XdyK4rMM31O4kpwEk26jeXsAbGorwd0pgc' 
                    });
                    if (token) console.log("Token FCM Gerado:", token);
                }
            } catch (err) { console.log("Erro ao obter token FCM:", err); }
        }

        onMessage(messaging, (payload) => {
            alert(`${payload.notification.title}: ${payload.notification.body}`);
        });

        initFCM();
    </script>

    <script>
        let msgs = JSON.parse(localStorage.getItem('axe_m')) || [];
        let rems = JSON.parse(localStorage.getItem('axe_r')) || [];
        let buys = JSON.parse(localStorage.getItem('axe_b')) || [];

        const dictionary = { "axe": "Axé", "og": "Ogum", "iem": "Iemanjá", "pret": "Preto Velho", "cab": "Caboclo", "xa": "Xangô", "ox": "Oxóssi", "ans": "Iansã" };

        window.switchTab = function(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            ['tab-chat', 'tab-notes', 'tab-dates', 'tab-buy'].forEach(t => {
                const nav = document.getElementById('nav-' + t);
                nav.classList.replace('text-[#FF3B30]', 'text-[#8E8E93]');
            });
            
            document.getElementById('nav-' + id).classList.replace('text-[#8E8E93]', 'text-[#FF3B30]');
            document.getElementById('input-bar').style.display = (id === 'tab-chat') ? 'flex' : 'none';
            lucide.createIcons();
        }

        window.checkCorrection = function(e) {
            if (e.key === " ") {
                let i = e.target;
                let w = i.value.split(" ");
                if(w.length < 2) return;
                let last = w[w.length - 2].toLowerCase();
                if (dictionary[last]) { w[w.length - 2] = dictionary[last]; i.value = w.join(" "); }
            }
        }

        window.analisarLembrete = function(texto) {
            texto = texto.toLowerCase();
            const regex = /(.*?)\s+(segunda|terça|terca|quarta|quinta|sexta|sábado|sabado|domingo|amanhã|amanha|hoje)(?:\s+(?:as|às)\s+(\d{1,2}(?::\d{2})?))?/i;
            const match = texto.match(regex);
            
            if(match) {
                let tarefa = match[1].replace(/^(lembrar de|lembrete de|lembrar|quero)\s+/i, "").trim();
                if(!tarefa) tarefa = "Lembrete";
                
                let diaTexto = match[2];
                let horaTexto = match[3]; 
                
                if(!horaTexto) horaTexto = "08:00"; 
                if(!horaTexto.includes(":")) horaTexto += ":00";
                if(horaTexto.length === 4) horaTexto = "0" + horaTexto; 

                let hoje = new Date();
                let dataAlvo = new Date(hoje);
                const mapaDias = {"domingo":0, "segunda":1, "terça":2, "terca":2, "quarta":3, "quinta":4, "sexta":5, "sábado":6, "sabado":6};
                
                if(diaTexto === "amanhã" || diaTexto === "amanha") {
                    dataAlvo.setDate(hoje.getDate() + 1);
                } else if(diaTexto !== "hoje") {
                    let diaDesejado = mapaDias[diaTexto];
                    let diaAtual = hoje.getDay();
                    let diff = diaDesejado - diaAtual;
                    if(diff <= 0) diff += 7; 
                    dataAlvo.setDate(hoje.getDate() + diff);
                }

                let dataFormatada = dataAlvo.toISOString().split('T')[0];
                return { 
                    tarefa: tarefa.charAt(0).toUpperCase() + tarefa.slice(1), 
                    dataFormatada, 
                    horaTexto 
                };
            }
            return null;
        }

        // NOVO: Integração Direta com Relógio no Android e Calendário no iOS
        window.addNativeCalendar = function(title, dateInput, timeInput) {
            let [y, m, d] = dateInput.split('-');
            let [h, min] = timeInput.split(':');
            
            let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            let isAndroid = /Android/.test(navigator.userAgent);

            if (isAndroid) {
                // ESTRATÉGIA ANDROID: Abre diretamente o app RELÓGIO / ALARME
                let intentUrl = `intent:#Intent;action=android.intent.action.SET_ALARM;i.android.intent.extra.alarm.HOUR=${parseInt(h, 10)};i.android.intent.extra.alarm.MINUTES=${parseInt(min, 10)};S.android.intent.extra.alarm.MESSAGE=${encodeURIComponent(title)};end`;
                window.location.href = intentUrl;

            } else if (isIOS) {
                // ESTRATÉGIA IOS: Continua baixando o evento para abrir o calendário nativo
                let dataInicio = `${y}${m}${d}T${h}${min}00`;
                let hFim = String((parseInt(h) + 1) % 24).padStart(2, '0');
                let dataFim = `${y}${m}${d}T${hFim}${min}00`;

                let icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${dataInicio}\nDTEND:${dataFim}\nSUMMARY:${title}\nDESCRIPTION:Criado no Meu Guia.\nBEGIN:VALARM\nTRIGGER:-PT0M\nACTION:DISPLAY\nDESCRIPTION:Lembrete\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`;
                
                let blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                let url = window.URL.createObjectURL(blob);
                
                let a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'lembrete.ics';
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);

            } else {
                // PC / Desktop
                let dataInicio = `${y}${m}${d}T${h}${min}00`;
                let hFim = String((parseInt(h) + 1) % 24).padStart(2, '0');
                let dataFim = `${y}${m}${d}T${hFim}${min}00`;
                let gCalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dataInicio}/${dataFim}&details=Criado+no+Meu+Guia`;
                window.open(gCalUrl, '_blank');
            }
        }

        window.sendMsg = function() {
            let i = document.getElementById('c-input');
            let txt = i.value.trim();
            if(!txt) return;

            let intel = analisarLembrete(txt);
            
            msgs.push({
                id: Date.now(), 
                text: txt, 
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                smart: intel 
            });

            if(intel) {
                let ts = new Date(`${intel.dataFormatada}T${intel.horaTexto}`).getTime();
                rems.push({id: ts, text: intel.tarefa, date: intel.dataFormatada, time: intel.horaTexto});
                
                // Dispara o Relógio do Android IMEDIATAMENTE
                addNativeCalendar(intel.tarefa, intel.dataFormatada, intel.horaTexto);
            }

            i.value = ""; render(); save();
        }

        window.addReminder = function() {
            let t = document.getElementById('d-title'), d = document.getElementById('d-day'), h = document.getElementById('d-time');
            if(!t.value || !d.value || !h.value) return;
            let ts = new Date(`${d.value}T${h.value}`).getTime();
            if(ts < Date.now()) return alert("Data já passou!");
            
            rems.push({id: ts, text: t.value, date: d.value, time: h.value});
            
            // Ativa o relógio nativo também pelo botão da tela Datas
            addNativeCalendar(t.value, d.value, h.value);
            
            t.value = ""; d.value = ""; h.value = "";
            render(); save();
        }

        window.addBuy = function() {
            let i = document.getElementById('b-input');
            if(!i.value.trim()) return;
            buys.push({id: Date.now(), text: i.value, checked: false});
            i.value = ""; render(); save();
        }

        window.render = function() {
            document.getElementById('chat-messages').innerHTML = msgs.map(m => `
                <div class="self-end bg-[#FF3B30] p-3 px-4 rounded-2xl rounded-tr-sm max-w-[80%] shadow-sm transition-all">
                    <p class="text-[15px] font-medium text-white leading-snug">${m.text}</p>
                    ${m.smart ? `
                        <button onclick="addNativeCalendar('${m.smart.tarefa}', '${m.smart.dataFormatada}', '${m.smart.horaTexto}')" class="mt-3 bg-black/20 hover:bg-black/30 text-white text-[11px] font-bold py-2 px-3 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-all w-full shadow-inner">
                            <i data-lucide="alarm-clock" size="14"></i> Adicionar no Relógio
                        </button>
                    ` : ''}
                    <p class="text-[10px] text-white/70 text-right mt-2 font-medium">${m.time}</p>
                </div>
            `).join('');

            const nList = document.getElementById('notes-list');
            if(msgs.length === 0) {
                nList.innerHTML = `<div class="bg-[#1C1C1E] rounded-2xl p-8 flex items-center justify-center opacity-50 border border-white/5"><p class="text-[11px] font-bold uppercase tracking-wider text-zinc-500">Nenhuma anotação</p></div>`;
            } else {
                nList.innerHTML = msgs.slice().reverse().map(m => `
                    <div class="bg-[#1C1C1E] p-4 rounded-2xl flex justify-between items-start gap-4 border border-white/5 active:bg-[#2C2C2E] transition-colors">
                        <div class="flex-1 font-medium text-[14px] text-zinc-200 leading-snug">${m.text}</div>
                        <button onclick="delN(${m.id})" class="text-zinc-600 hover:text-[#FF3B30] p-1 transition-colors"><i data-lucide="x-circle" size="18"></i></button>
                    </div>
                `).join('');
            }

            document.getElementById('b-count').innerText = buys.filter(b => !b.checked).length;
            document.getElementById('buy-list').innerHTML = buys.map(b => `
                <div class="bg-[#1C1C1E] p-4 rounded-2xl flex items-center justify-between border border-white/5 transition-colors">
                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="tBuy(${b.id})">
                        <div class="w-6 h-6 rounded-full border-2 border-zinc-600 flex items-center justify-center transition-colors ${b.checked?'bg-[#FF3B30] border-[#FF3B30]':''}">
                            ${b.checked ? '<i data-lucide="check" class="text-white" size="14"></i>' : ''}
                        </div>
                        <span class="text-[15px] font-medium transition-all ${b.checked?'checked-item':''}">${b.text}</span>
                    </div>
                    <button onclick="delB(${b.id})" class="text-zinc-600 hover:text-[#FF3B30] transition-colors"><i data-lucide="trash" size="18"></i></button>
                </div>
            `).join('');

            document.getElementById('reminders-list').innerHTML = rems.map(r => `
                <div class="bg-[#1C1C1E] p-4 rounded-2xl flex justify-between items-center border border-white/5 border-l-4 border-l-[#FF3B30]">
                    <div class="flex-1" onclick="addNativeCalendar('${r.text}', '${r.date}', '${r.time}')">
                        <p class="font-semibold text-[14px] text-zinc-100 cursor-pointer">${r.text}</p>
                        <p class="text-[11px] text-[#FF3B30]/80 mt-1 font-medium flex items-center gap-1">
                            <i data-lucide="clock" size="10"></i> ${r.date.split('-').reverse().join('/')} às ${r.time}
                        </p>
                    </div>
                    <button onclick="delR(${r.id})" class="text-zinc-600 hover:text-[#FF3B30] p-2 transition-colors ml-2"><i data-lucide="trash" size="18"></i></button>
                </div>
            `).join('');
            
            lucide.createIcons();
            const chatSection = document.getElementById('tab-chat');
            chatSection.scrollTop = chatSection.scrollHeight;
        }

        window.delN = function(id) { msgs = msgs.filter(m => m.id !== id); render(); save(); }
        window.delB = function(id) { buys = buys.filter(b => b.id !== id); render(); save(); }
        window.delR = function(id) { rems = rems.filter(r => r.id !== id); render(); save(); }
        window.tBuy = function(id) { let i = buys.find(x => x.id === id); i.checked = !i.checked; render(); save(); }
        
        window.save = function() { 
            localStorage.setItem('axe_m', JSON.stringify(msgs)); 
            localStorage.setItem('axe_r', JSON.stringify(rems)); 
            localStorage.setItem('axe_b', JSON.stringify(buys)); 
        }

        window.shareBuy = function() { 
            let t = "*LISTA DE COMPRAS - AXÉ*\n\n" + buys.map(b => (b.checked?"~":"- ")+b.text+(b.checked?"~":"")).join("\n"); 
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(t); 
        }

        window.onload = () => { render(); lucide.createIcons(); };
    </script>
</body>
</html>
