<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Guia Axe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background: #0B141A; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Notebook Style de Notas */
        .notebook-card {
            background-color: #121212;
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 100% 30px;
            border-left: 6px solid #e11d48;
            border-radius: 12px;
            min-height: 100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .checked-item { text-decoration: line-through; opacity: 0.4; }
        
        /* Modal de Atualizacao OTA */
        #update-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="update-modal">
        <div class="bg-zinc-900 border border-red-700 p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 class="font-black text-xl mb-1 uppercase text-white">Sistema Atualizado</h2>
            <p class="text-zinc-500 text-[10px] mb-6 uppercase font-bold">Versao Atual: <span id="v-text" class="text-red-600"></span></p>
            <div class="text-left bg-black/40 p-4 rounded-2xl mb-8 border border-zinc-800 text-[10px] text-zinc-300 space-y-2 uppercase font-bold">
                <p class="text-red-600 mb-2 font-black tracking-widest text-[9px]">NOVAS FUNCOES:</p>
                <li>+ Atualizacao Automatica via Nuvem</li>
                <li>+ Sincronizacao em tempo real</li>
                <li>+ Correcao de banco de dados</li>
            </div>
            <button onclick="closeUpdateModal()" class="w-full bg-red-700 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Entendido</button>
        </div>
    </div>

    <header class="bg-[#202C33] p-4 border-b border-zinc-800 flex items-center justify-center gap-3">
        <img src="https://henriquedev25.github.io/Meu-Guia-Axe/logo.png" alt="Logo" class="h-6 w-6">
        <h1 class="text-[10px] font-black tracking-[0.4em] text-zinc-400 uppercase">Meu Guia Axe</h1>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar pb-32">
        <section id="tab-chat" class="tab-content active p-4">
            <div id="chat-messages" class="flex flex-col gap-3"></div>
        </section>

        <section id="tab-notes" class="tab-content p-4">
            <div id="notes-list" class="flex flex-col gap-5"></div>
        </section>

        <section id="tab-dates" class="tab-content p-4">
            <div class="bg-zinc-800/40 p-6 rounded-[24px] border border-zinc-700">
                <input type="text" id="d-title" placeholder="Aviso" class="w-full bg-transparent border-b border-zinc-700 p-2 mb-6 outline-none text-white font-bold">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="date" id="d-day" class="bg-zinc-900 p-3 rounded-xl text-white">
                    <input type="time" id="d-time" class="bg-zinc-900 p-3 rounded-xl text-white">
                </div>
                <button onclick="addReminder()" class="w-full bg-red-700 py-4 rounded-xl font-black text-[10px] uppercase">Agendar</button>
            </div>
            <div id="reminders-list" class="mt-6 flex flex-col gap-3"></div>
        </section>

        <section id="tab-buy" class="tab-content p-4">
            <div class="bg-zinc-800/40 p-5 rounded-[24px] border border-zinc-700">
                <div class="flex justify-between mb-4"><p class="text-[9px] font-black text-red-600">COMPRAS</p><span id="b-count" class="text-[9px] font-black text-zinc-500">0 ITENS</span></div>
                <div class="flex gap-2">
                    <input type="text" id="b-input" placeholder="Adicionar..." class="flex-1 bg-transparent border-b border-zinc-700 p-2 text-white">
                    <button onclick="addBuy()" class="bg-red-700 p-3 rounded-xl"><i data-lucide="plus" size="20"></i></button>
                </div>
            </div>
            <div id="buy-list" class="mt-4 flex flex-col gap-2"></div>
            <button onclick="shareBuy()" class="w-full bg-[#25D366] text-black py-4 mt-4 rounded-2xl font-black text-[10px] uppercase">WhatsApp</button>
        </section>
    </main>

    <div id="input-bar" class="fixed bottom-20 w-full p-3 bg-[#0B141A] flex gap-2 items-center">
        <input type="text" id="c-input" placeholder="Escreva..." class="flex-1 bg-[#2A3942] rounded-2xl p-3 outline-none" onkeyup="checkCorrection(event)">
        <button onclick="sendMsg()" class="bg-red-700 p-4 rounded-full"><i data-lucide="send" size="20"></i></button>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#202C33] flex justify-around p-3 pb-8">
        <button onclick="switchTab('tab-chat')" class="text-red-600 flex flex-col items-center" id="nav-tab-chat"><i data-lucide="message-square" size="18"></i><span class="text-[8px] font-black">CONVERSA</span></button>
        <button onclick="switchTab('tab-notes')" class="text-zinc-500 flex flex-col items-center" id="nav-tab-notes"><i data-lucide="sticky-note" size="18"></i><span class="text-[8px] font-black">NOTAS</span></button>
        <button onclick="switchTab('tab-dates')" class="text-zinc-500 flex flex-col items-center" id="nav-tab-dates"><i data-lucide="calendar-clock" size="18"></i><span class="text-[8px] font-black">DATAS</span></button>
        <button onclick="switchTab('tab-buy')" class="text-zinc-500 flex flex-col items-center" id="nav-tab-buy"><i data-lucide="shopping-cart" size="18"></i><span class="text-[8px] font-black">COMPRAS</span></button>
    </nav>

    <script>
        let msgs = JSON.parse(localStorage.getItem('axe_m')) || [];
        let rems = JSON.parse(localStorage.getItem('axe_r')) || [];
        let buys = JSON.parse(localStorage.getItem('axe_b')) || [];

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('input-bar').style.display = (id === 'tab-chat') ? 'flex' : 'none';
            lucide.createIcons();
        }

        function checkCorrection(e) {
            const dic = { "axe": "Axe", "og": "Ogum", "iem": "Iemanja", "pret": "Preto Velho" };
            if (e.key === " ") {
                let v = e.target.value.split(" ");
                let last = v[v.length-2].toLowerCase();
                if(dic[last]) { v[v.length-2] = dic[last]; e.target.value = v.join(" "); }
            }
        }

        function sendMsg() {
            let i = document.getElementById('c-input');
            if(!i.value) return;
            msgs.push({id: Date.now(), text: i.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
            i.value = ""; render(); save();
        }

        function addReminder() {
            let t = document.getElementById('d-title'), d = document.getElementById('d-day'), h = document.getElementById('d-time');
            if(!t.value || !d.value || !h.value) return;
            let ts = new Date(`${d.value}T${h.value}`).getTime();
            rems.push({id: ts, text: t.value, date: d.value, time: h.value});
            if(window.AndroidInterface) window.AndroidInterface.agendarNotificacao("Lembrete Axe", t.value, ts);
            t.value = ""; render(); save();
        }

        function addBuy() {
            let i = document.getElementById('b-input');
            if(!i.value) return;
            buys.push({id: Date.now(), text: i.value, checked: false});
            i.value = ""; render(); save();
        }

        function render() {
            document.getElementById('chat-messages').innerHTML = msgs.map(m => `<div class="self-end bg-red-700 p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg"><p class="text-sm font-bold text-white">${m.text}</p><p class="text-[8px] text-red-200 text-right mt-1">${m.time}</p></div>`).join('');
            
            const nList = document.getElementById('notes-list');
            if(msgs.length === 0) nList.innerHTML = `<div class="notebook-card flex items-center justify-center opacity-20"><p class="text-[10px] font-black uppercase">Vazio</p></div>`;
            else nList.innerHTML = msgs.slice().reverse().map(m => `<div class="notebook-card p-4 flex justify-between items-start"><p class="text-xs font-bold leading-[30px]">${m.text}</p><button onclick="delN(${m.id})" class="text-red-600"><i data-lucide="x" size="18"></i></button></div>`).join('');

            document.getElementById('buy-list').innerHTML = buys.map(b => `<div class="bg-zinc-800/30 p-4 rounded-xl flex items-center justify-between border border-zinc-800"><div class="flex items-center gap-3" onclick="tBuy(${b.id})"><div class="w-5 h-5 rounded border-2 border-red-700 ${b.checked?'bg-red-700':''}"></div><span class="text-sm ${b.checked?'checked-item':''}">${b.text}</span></div><button onclick="delB(${b.id})"><i data-lucide="trash-2" size="16"></i></button></div>`).join('');
            
            document.getElementById('reminders-list').innerHTML = rems.map(r => `<div class="bg-zinc-800/40 p-4 rounded-2xl flex justify-between items-center"><div><p class="font-bold text-xs">${r.text}</p><p class="text-[8px] text-zinc-500 uppercase mt-1">${r.date} - ${r.time}</p></div><button onclick="delR(${r.id})" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button></div>`).join('');
            
            lucide.createIcons();
        }

        function delN(id) { msgs = msgs.filter(m => m.id !== id); render(); save(); }
        function delB(id) { buys = buys.filter(b => b.id !== id); render(); save(); }
        function delR(id) { rems = rems.filter(r => r.id !== id); render(); save(); }
        function tBuy(id) { let i = buys.find(x => x.id === id); i.checked = !i.checked; render(); save(); }
        function save() { localStorage.setItem('axe_m', JSON.stringify(msgs)); localStorage.setItem('axe_r', JSON.stringify(rems)); localStorage.setItem('axe_b', JSON.stringify(buys)); }
        function shareBuy() { let t = "*LISTA AXE*\n\n" + buys.map(b => (b.checked?"~":"[ ] ")+b.text+(b.checked?"~":"")).join("\n"); window.location.href = "whatsapp://send?text=" + encodeURIComponent(t); }

        function checkUp() {
            if(window.AndroidInterface) {
                let cur = window.AndroidInterface.getAppVersion();
                let last = localStorage.getItem('v');
                if(last && last !== cur) { document.getElementById('v-text').innerText = cur; document.getElementById('update-modal').style.display='flex'; }
                localStorage.setItem('v', cur);
            }
        }

        function closeUpdateModal() { document.getElementById('update-modal').style.display='none'; }
        window.onload = () => { render(); checkUp(); lucide.createIcons(); };
    </script>
</body>
</html>
