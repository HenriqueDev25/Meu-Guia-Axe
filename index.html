<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meu Guia Axe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background: #0B141A; 
            color: white; 
            overflow: hidden; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; height: 100%; overflow-y: auto; }
        .tab-content.active { display: block; }

        /* Estilo Caderno Pautado */
        .notebook-card {
            background-color: #121212;
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 100% 30px;
            border-left: 6px solid #e11d48;
            border-radius: 12px;
            min-height: 120px;
            line-height: 30px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .checked-item { text-decoration: line-through; opacity: 0.3; }

        #update-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 999; align-items: center; justify-content: center; padding: 20px;
        }

        main { padding-bottom: 120px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="update-modal">
        <div class="bg-zinc-900 border border-red-700 p-8 rounded-[32px] w-full max-w-sm text-center">
            <h2 class="font-black text-xl mb-1 uppercase text-white">App Atualizado</h2>
            <p class="text-zinc-500 text-[10px] mb-6 uppercase font-bold tracking-widest">Nova versao: <span id="v-text" class="text-red-600"></span></p>
            <button onclick="closeUpdateModal()" class="w-full bg-red-700 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Entendido</button>
        </div>
    </div>

    <header class="bg-[#202C33] p-4 border-b border-zinc-800 flex items-center justify-center gap-3">
        <img src="logo.png" class="h-6 w-6 object-contain" onerror="this.style.display='none'">
        <h1 class="text-[10px] font-black tracking-[0.4em] text-zinc-400 uppercase">Meu Guia Axe</h1>
    </header>

    <main class="flex-1 overflow-hidden relative">
        <section id="tab-chat" class="tab-content active p-4 no-scrollbar">
            <div id="chat-messages" class="flex flex-col gap-3"></div>
        </section>

        <section id="tab-notes" class="tab-content p-4 no-scrollbar">
            <div id="notes-list" class="flex flex-col gap-6"></div>
        </section>

        <section id="tab-dates" class="tab-content p-4 no-scrollbar">
            <div class="bg-zinc-800/40 p-6 rounded-[24px] border border-zinc-700 mb-6 shadow-xl">
                <input type="text" id="d-title" placeholder="Aviso" class="w-full bg-transparent border-b border-zinc-700 p-2 mb-6 outline-none text-white font-bold">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="date" id="d-day" class="bg-zinc-900 p-3 rounded-xl text-white text-xs">
                    <input type="time" id="d-time" class="bg-zinc-900 p-3 rounded-xl text-white text-xs">
                </div>
                <button onclick="addReminder()" class="w-full bg-red-700 py-4 rounded-xl font-black text-[10px] uppercase">Salvar Alarme</button>
            </div>
            <div id="reminders-list" class="flex flex-col gap-3"></div>
        </section>

        <section id="tab-buy" class="tab-content p-4 no-scrollbar">
            <div class="bg-zinc-800/40 p-5 rounded-[24px] border border-zinc-700 mb-4">
                <div class="flex justify-between items-center mb-4 text-[9px] font-black">
                    <p class="text-red-600 uppercase">Lista de Compras</p>
                    <span id="b-count" class="text-zinc-500">0 ITENS</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="b-input" placeholder="Adicionar..." class="flex-1 bg-transparent border-b border-zinc-700 p-2 text-white text-sm">
                    <button onclick="addBuy()" class="bg-red-700 p-3 rounded-xl"><i data-lucide="plus" size="20"></i></button>
                </div>
            </div>
            <div id="buy-list" class="flex flex-col gap-2 mb-4"></div>
            <button onclick="shareBuy()" class="w-full bg-[#25D366] text-black py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2">
                <i data-lucide="share-2" size="16"></i> WhatsApp
            </button>
        </section>
    </main>

    <div id="input-bar" class="fixed bottom-20 w-full p-4 bg-[#0B141A] flex gap-2 items-center">
        <input type="text" id="c-input" placeholder="Escreva aqui..." class="flex-1 bg-[#2A3942] rounded-2xl p-3 outline-none text-sm text-white" onkeyup="checkCorrection(event)">
        <button onclick="sendMsg()" class="bg-red-700 p-4 rounded-full"><i data-lucide="send" size="20"></i></button>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#202C33] flex justify-around p-3 border-t border-zinc-800 pb-8">
        <button onclick="switchTab('tab-chat')" class="flex flex-col items-center gap-1 text-red-600" id="nav-tab-chat"><i data-lucide="message-square" size="18"></i><span class="text-[8px] font-black">CONVERSA</span></button>
        <button onclick="switchTab('tab-notes')" class="flex flex-col items-center gap-1 text-zinc-500" id="nav-tab-notes"><i data-lucide="sticky-note" size="18"></i><span class="text-[8px] font-black">NOTAS</span></button>
        <button onclick="switchTab('tab-dates')" class="flex flex-col items-center gap-1 text-zinc-500" id="nav-tab-dates"><i data-lucide="calendar-clock" size="18"></i><span class="text-[8px] font-black">DATAS</span></button>
        <button onclick="switchTab('tab-buy')" class="flex flex-col items-center gap-1 text-zinc-500" id="nav-tab-buy"><i data-lucide="shopping-cart" size="18"></i><span class="text-[8px] font-black">COMPRAS</span></button>
    </nav>

    <script>
        // Dados locais
        let msgs = JSON.parse(localStorage.getItem('axe_m')) || [];
        let rems = JSON.parse(localStorage.getItem('axe_r')) || [];
        let buys = JSON.parse(localStorage.getItem('axe_b')) || [];

        // Registro de Service Worker para Notificações Web
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        async function requestNotif() {
            if (!window.AndroidInterface && 'Notification' in window) {
                await Notification.requestPermission();
            }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            ['tab-chat', 'tab-notes', 'tab-dates', 'tab-buy'].forEach(t => {
                document.getElementById('nav-' + t).classList.replace('text-red-600', 'text-zinc-500');
            });
            document.getElementById('nav-' + id).classList.replace('text-zinc-500', 'text-red-600');
            document.getElementById('input-bar').style.display = (id === 'tab-chat') ? 'flex' : 'none';
            lucide.createIcons();
        }

        function checkCorrection(e) {
            const dic = {"axe":"Axe","og":"Ogum","iem":"Iemanja","pret":"Preto Velho","cab":"Caboclo"};
            if (e.key === " ") {
                let v = e.target.value.split(" ");
                let last = v[v.length-2]?.toLowerCase();
                if(dic[last]) { v[v.length-2] = dic[last]; e.target.value = v.join(" "); }
            }
        }

        function sendMsg() {
            let i = document.getElementById('c-input');
            if(!i.value.trim()) return;
            msgs.push({id: Date.now(), text: i.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
            i.value = ""; render(); save();
        }

        function addReminder() {
            let t = document.getElementById('d-title'), d = document.getElementById('d-day'), h = document.getElementById('d-time');
            if(!t.value || !d.value || !h.value) return;
            let ts = new Date(`${d.value}T${h.value}`).getTime();
            let delay = ts - Date.now();

            if(delay < 0) return alert("Data ja passou!");

            rems.push({id: ts, text: t.value, date: d.value, time: h.value});

            if(window.AndroidInterface) {
                window.AndroidInterface.agendarNotificacao("Aviso de Axe", t.value, ts);
            } else if ('serviceWorker' in navigator && Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.active.postMessage({type: 'SCHEDULE', title: "Lembrete Axe", body: t.value, delay: delay});
                });
            }

            t.value = ""; render(); save();
        }

        function addBuy() {
            let i = document.getElementById('b-input');
            if(!i.value.trim()) return;
            buys.push({id: Date.now(), text: i.value, checked: false});
            i.value = ""; render(); save();
        }

        function render() {
            document.getElementById('chat-messages').innerHTML = msgs.map(m => `<div class="self-end bg-red-700 p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg"><p class="text-sm font-bold text-white">${m.text}</p><p class="text-[8px] text-red-200 text-right mt-1 font-black">${m.time}</p></div>`).join('');
            
            const nList = document.getElementById('notes-list');
            nList.innerHTML = msgs.length === 0 ? `<div class="notebook-card flex items-center justify-center opacity-20 text-[10px] font-black uppercase">Vazio</div>` : 
            msgs.slice().reverse().map(m => `<div class="notebook-card p-4 flex justify-between items-start gap-4"><div class="flex-1 pt-2 font-medium">${m.text}</div><button onclick="delN(${m.id})" class="text-red-600 p-2"><i data-lucide="x" size="16"></i></button></div>`).join('');

            document.getElementById('b-count').innerText = `${buys.filter(b => !b.checked).length} ITENS`;
            document.getElementById('buy-list').innerHTML = buys.map(b => `<div class="bg-zinc-800/30 p-4 rounded-xl flex items-center justify-between border border-zinc-800"><div class="flex items-center gap-4 flex-1" onclick="tBuy(${b.id})"><div class="w-6 h-6 rounded border-2 border-red-700 ${b.checked?'bg-red-700':''}"></div><span class="text-sm font-bold ${b.checked?'checked-item':''}">${b.text}</span></div><button onclick="delB(${b.id})" class="text-zinc-600"><i data-lucide="trash-2" size="18"></i></button></div>`).join('');

            document.getElementById('reminders-list').innerHTML = rems.map(r => `<div class="bg-zinc-800/40 p-5 rounded-2xl flex justify-between items-center border border-zinc-700"><div><p class="font-bold text-xs">${r.text}</p><p class="text-[8px] text-zinc-500 uppercase mt-1 font-black">${r.date.split('-').reverse().join('/')} - ${r.time}</p></div><button onclick="delR(${r.id})" class="text-red-500 bg-red-600/10 p-2 rounded-xl"><i data-lucide="trash-2" size="18"></i></button></div>`).join('');
            lucide.createIcons();
        }

        function delN(id) { msgs = msgs.filter(m => m.id !== id); render(); save(); }
        function delB(id) { buys = buys.filter(b => b.id !== id); render(); save(); }
        function delR(id) { rems = rems.filter(r => r.id !== id); render(); save(); }
        function tBuy(id) { let i = buys.find(x => x.id === id); i.checked = !i.checked; render(); save(); }
        function save() { localStorage.setItem('axe_m', JSON.stringify(msgs)); localStorage.setItem('axe_r', JSON.stringify(rems)); localStorage.setItem('axe_b', JSON.stringify(buys)); }
        function shareBuy() { let t = "*LISTA AXE*\n\n" + buys.map(b => (b.checked?"~":"- ")+b.text+(b.checked?"~":"")).join("\n"); window.location.href = "whatsapp://send?text=" + encodeURIComponent(t); }

        function checkUp() {
            if(window.AndroidInterface) {
                let cur = window.AndroidInterface.getAppVersion();
                let last = localStorage.getItem('v');
                if(last && last !== cur) { document.getElementById('v-text').innerText = cur; document.getElementById('update-modal').style.display='flex'; }
                localStorage.setItem('v', cur);
            }
        }
        function closeUpdateModal() { document.getElementById('update-modal').style.display='none'; }
        window.onload = () => { render(); checkUp(); lucide.createIcons(); requestNotif(); };
    </script>
</body>
</html>
